<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta http-equiv="X-UA-Compatible", content="ie=edge,chrome=1">
    <link rel="stylesheet" type="text/css" href="styles.css?ver=1">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nanum+Gothic">
    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
    <title>AnimateJS</title>
</head>
<body>
    <div id="jsLoading" class="loading">
        <p id="jsLoadingInfo" class="loading_info">현재 이 사이트는 개발 중에 있습니다. PC의 최대화된 화면으로 접근하길 권장합니다.</p>
        <p id="jsLoadingText" class="loading_text">0%</p>
    </div>
    <div id="header" class="header">26 animated TMI</div>
    <div id="jsMenu" class="menu"></div>
    <div id="jsContent" class="content">
        <canvas id="content_canvas" style="z-index: 5;"></canvas>
        <div id="jsButtonSection" class="btn_section">    
            <div id="jsCloseContent" class="btn" style="background-color: red;"></div>
            <div id="jsInteractionInfo" class="btn" style="background-color: blue;"></div>
        </div>
        <div id="jsContentDescription" class="content_description">
            <div id = "jsUpDownDescription" class="updown_btn"></div>
            <p id="jsText" class="content_text"></p>
        </div>
    </div>  
    <script type="module" src="./app.js?ver=1"></script>
</body>
</html>
